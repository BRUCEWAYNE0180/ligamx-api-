services:
  - type: web
    name: ligamx-api
    runtime: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 10000"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.10"
      # El sync programado lo ejecuta GitHub Actions (.github/workflows/sync.yml).
      # Si prefieres que el propio web service haga el sync cada 6h, pon "true".
      - key: RUN_SCHEDULER
        value: "false"
      # IMPORTANTE: define el valor real en el dashboard de Render (Environment),
      # no lo dejes en el repo.
      - key: SYNC_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: ligamx-db
          property: connectionString

databases:
  - name: ligamx-db
    databaseName: ligamx
    user: ligamx
    plan: free
